<head>

  <meta name="description" content="Healing ambient frequencies for deep rest." />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #07090f;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .artwork {
      width: 100%;
      max-width: 320px;
      aspect-ratio: 1;
      border-radius: 8px;
      object-fit: cover;
      display: block;
      margin: 0 auto 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    }

    .label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.85);
      margin-bottom: 0.4rem;
    }

    .sub {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.05em;
      margin-bottom: 2rem;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 0.95rem;
      background: #1DB954;
      border: none;
      border-radius: 50px;
      color: #000;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:hover, .btn:active { opacity: 0.88; }

    .note {
      margin-top: 1.2rem;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="artwork" src="cosmic-sleep.jpg" alt="Cosmic Sleep" />
    <p class="label">Exit &amp; Rest</p>
    <h1>cosmic sleep</h1>
    <p class="sub">ambient healing frequencies</p>
    <a class="btn" id="btn"
       href="https://open.spotify.com/track/0X4wTVLpA2GsGF7UHFUl7G?context=spotify:playlist:4doqZUR4rfbrkMHptTirj3&si=fc404e6fbe9a4db4"
       onclick="trackClick()">
      Listen on Spotify
    </a>
    <p class="note">redirecting in <span id="count">5</span>s</p>
  </div>

  <script>
    const URL = 'https://open.spotify.com/track/0X4wTVLpA2GsGF7UHFUl7G?context=spotify:playlist:4doqZUR4rfbrkMHptTirj3&si=fc404e6fbe9a4db4';

    function trackClick() {
      fbq('track', 'Lead', { content_name: 'spotify_click', content_category: 'cosmic_sleep' });
    }

    let sec = 5;
    const el = document.getElementById('count');
    const t = setInterval(() => {
      sec--;
      el.textContent = sec;
      if (sec <= 0) {
        clearInterval(t);
        fbq('track', 'Lead', { content_name: 'auto_redirect', content_category: 'cosmic_sleep' });
        window.location.href = URL;
      }
    }, 1000);
  </script>
</body>
</html>
