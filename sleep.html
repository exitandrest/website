<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="1 hour of healing ambient sleep music. Follow the Cosmic Sleep playlist on Spotify." />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #060c1a;
      color: #e0e8ff;
      font-family: Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(224,232,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 10%, rgba(224,232,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 70%, rgba(224,232,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 80%, rgba(224,232,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 60%, rgba(224,232,255,0.2) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }
    .container { position: relative; z-index: 1; max-width: 480px; width: 100%; }
    .logo { font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(224,232,255,0.4); margin-bottom: 3rem; }
    .glow {
      width: 120px; height: 120px; border-radius: 50%;
      background: radial-gradient(circle, rgba(42,64,102,0.8) 0%, rgba(10,20,40,0.4) 60%, transparent 100%);
      box-shadow: 0 0 60px 20px rgba(42,64,102,0.5), 0 0 120px 40px rgba(10,20,40,0.3);
      margin: 0 auto 2.5rem;
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.08); opacity: 1; } }
    h1 { font-size: 1.75rem; font-weight: 300; letter-spacing: 0.05em; color: #e0e8ff; margin-bottom: 1rem; line-height: 1.3; }
    p { font-size: 0.95rem; line-height: 1.8; color: rgba(224,232,255,0.55); margin-bottom: 2.5rem; }
    .btn {
      display: inline-block; padding: 1rem 2.5rem;
      background: transparent; border: 1px solid rgba(224,232,255,0.25);
      border-radius: 50px; color: #e0e8ff; text-decoration: none;
      font-size: 0.9rem; letter-spacing: 0.1em; text-transform: uppercase;
      transition: all 0.3s ease; cursor: pointer;
    }
    .btn:hover { background: rgba(224,232,255,0.08); border-color: rgba(224,232,255,0.5); box-shadow: 0 0 30px rgba(42,64,102,0.4); }
    .redirect-note { margin-top: 1.5rem; font-size: 0.75rem; color: rgba(224,232,255,0.25); letter-spacing: 0.05em; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Exit & Rest</div>
    <div class="glow"></div>
    <h1>Cosmic Sleep</h1>
    <p>Healing ambient frequencies for deep rest.<br>Let the sounds carry you somewhere quiet.</p>
    <a class="btn" id="spotify-btn"
       href="https://open.spotify.com/playlist/37i9dQZF1DXa2PvUpywmrr"
       onclick="trackClick()">
      Follow on Spotify
    </a>
    <p class="redirect-note">Opening Spotify in <span id="count">5</span>s</p>
  </div>
  <script>
    const PLAYLIST_URL = 'https://open.spotify.com/playlist/37i9dQZF1DXa2PvUpywmrr';
    function trackClick() {
      fbq('track', 'Lead', { content_name: 'spotify_click', content_category: 'cosmic_sleep' });
    }
    let sec = 5;
    const countEl = document.getElementById('count');
    const interval = setInterval(() => {
      sec--;
      countEl.textContent = sec;
      if (sec <= 0) {
        clearInterval(interval);
        fbq('track', 'Lead', { content_name: 'auto_redirect', content_category: 'cosmic_sleep' });
        window.location.href = PLAYLIST_URL;
      }
    }, 1000);
  </script>
</body>
</html>
