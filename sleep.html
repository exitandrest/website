  <style>
    @font-face {
      font-family: 'MuseoModerno';
      src: url('MuseoModerno.ttf') format('truetype');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #07090f;
      font-family: 'MuseoModerno', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      gap: 0;
    }
    .logo {
      width: 52px;
      height: 52px;
      object-fit: contain;
      opacity: 0.35;
      margin-bottom: 2.2rem;
      mix-blend-mode: screen;
    }
    .card {
      width: 100%;
      max-width: 340px;
      text-align: center;
    }
    .artwork {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 6px;
      object-fit: cover;
      display: block;
      margin: 0 auto 1.8rem;
      box-shadow: 0 24px 64px rgba(0,0,0,0.85);
    }
    h1 {
      font-size: 1.2rem;
      font-weight: 200;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.78);
      margin-bottom: 0.3rem;
    }
    .sub {
      font-size: 0.68rem;
      font-weight: 300;
      color: rgba(255,255,255,0.22);
      letter-spacing: 0.14em;
      margin-bottom: 1.8rem;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 0.88rem;
      background: #1DB954;
      border: none;
      border-radius: 50px;
      color: #000;
      font-family: 'MuseoModerno', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover, .btn:active { opacity: 0.85; }
    .note {
      margin-top: 1rem;
      font-size: 0.62rem;
      font-weight: 300;
      color: rgba(255,255,255,0.13);
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <img class="logo" src="ear-logo.jpg" alt="Exit and Rest" />
  <div class="card">
    <img class="artwork" src="cosmic-sleep.jpg" alt="Cosmic Sleep" />
    <h1>cosmic sleep</h1>
    <p class="sub">ambient healing frequencies</p>
    <a class="btn" href="https://open.spotify.com/track/0X4wTVLpA2GsGF7UHFUl7G?context=spotify:playlist:4doqZUR4rfbrkMHptTirj3&si=fc404e6fbe9a4db4" onclick="trackClick()">
      Listen on Spotify
    </a>
    <p class="note">redirecting in <span id="count">5</span>s</p>
  </div>

  <script>
    const URL = 'https://open.spotify.com/track/0X4wTVLpA2GsGF7UHFUl7G?context=spotify:playlist:4doqZUR4rfbrkMHptTirj3&si=fc404e6fbe9a4db4';
    function trackClick() {
      fbq('track', 'Lead', { content_name: 'spotify_click', content_category: 'cosmic_sleep' });
    }
    let sec = 5;
    const el = document.getElementById('count');
    const t = setInterval(() => {
      sec--;
      el.textContent = sec;
      if (sec <= 0) {
        clearInterval(t);
        fbq('track', 'Lead', { content_name: 'auto_redirect', content_category: 'cosmic_sleep' });
        window.location.href = URL;
      }
    }, 1000);
  </script>
</body>
</html>
